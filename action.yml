name: 'Verify Secrets'
description: 'This action will verify all secrets used in yaml files are defined as github secrets.'
author: Chris Tallman
branding:
  icon: 'user'
  color: 'red'
# No inputs needed - everything is extracted from GitHub context
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install GitHub CLI
      shell: bash
      run: |
        type -p curl >/dev/null || (apt update && apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
    
    - name: Authenticate GitHub CLI
      shell: bash
      run: |
        # Store token in a temporary variable
        GH_TOKEN="${GITHUB_TOKEN}"
        # Unset GITHUB_TOKEN to avoid GitHub CLI error
        unset GITHUB_TOKEN
        # Authenticate with the stored token
        echo "$GH_TOKEN" | gh auth login --with-token
      env:
        GITHUB_TOKEN: ${{ github.token }}
    
    - name: Install Python dependencies
      shell: bash
      run: pip install requests PyYAML
    
    - name: Verify secrets
      shell: bash
      run: |
        python $GITHUB_ACTION_PATH/check.py
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
        GITHUB_TOKEN: ${{ github.token }}
