name: Update Release Tag
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Update Major Version Tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            let tagName;
            if (context.payload.release) {
              tagName = context.payload.release.tag_name;
            } else {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              tagName = latestRelease.data.tag_name;
            }
            const match = tagName.match(/^(v\d+)\./);
            if (!match) {
              console.log(`Tag ${tagName} does not match expected semver format, skipping`);
              return;
            }
            const tagRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagName}`,
            });
            const sha = tagRef.data.object.sha;
            const majorTag = match[1];
            try {
              // updateRef uses short ref format (tags/...) per GitHub API
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${majorTag}`,
                sha: sha,
                force: true,
              });
              console.log(`Updated ${majorTag} to point to ${sha} (${tagName})`);
            } catch (err) {
              if (err.status === 422) {
                // createRef requires full ref format (refs/tags/...) per GitHub API
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${majorTag}`,
                  sha: sha,
                });
                console.log(`Created ${majorTag} pointing to ${sha} (${tagName})`);
              } else {
                throw err;
              }
            }